# Dev tasks for zap. Run `mise tasks` to list, `mise run <task>` to execute.
# Extra args after `--` are appended to the task's command:
#   mise run test -- -run TestFoo
#   mise run bench -- -benchtime 5s

[tools]
goreleaser = "2.15.4"
golangci-lint = "latest"
typos = "latest"
"go:go.uber.org/nilaway/cmd/nilaway" = "latest"
"go:golang.org/x/pkgsite/cmd/pkgsite" = "latest"

[vars]
COV_DATA = "coverage.out"

[tasks.tidy]
description = "Tidy dependencies in go.mod and go.sum"
sources = ["**/*.go", "go.mod", "go.sum"]
run = "go mod tidy"

[tasks.gen]
description = "Run go generate"
sources = ["**/*.go"]
run = "go generate ./..."

[tasks.fmt]
description = "Run go fmt on all source files"
sources = ["**/*.go", ".golangci.yml"]
run = "golangci-lint fmt ./..."

[tasks.test]
description = "Run the test suite"
sources = [
  "**/*.go",
  "go.mod",
  "go.sum",
  "**/testdata/**/*",
  "**/templates/**/*",
]
# -race needs CGO (https://go.dev/doc/articles/race_detector#Requirements)
env = { CGO_ENABLED = "1" }
run = "go test -race ./..."

[tasks.bats]
description = "Run the bats integration tests"
# Build inside the container's OS
env = { GOOS = "linux" }
run = """
docker stats --no-stream >/dev/null 2>&1 || { echo 'The docker daemon must be running'; exit 1; }
mkdir -p ./bin
trap 'rm -rf ./bin ./dist' EXIT
go build -o ./bin/zap -ldflags='-s -w -X go.followtheprocess.codes/zap/internal/cmd.version=test' ./cmd/zap
docker run --rm --interactive --tty --volume "$PWD:/code" bats/bats:latest /code/tests
"""

[tasks.build]
description = "Compile the project binary"
sources = ["**/*.go", "go.mod", "go.sum", ".goreleaser.yml"]
outputs = ["bin", "dist"]
run = [
  "mkdir -p ./bin",
  "goreleaser build --single-target --skip before --snapshot --clean --output ./bin/zap",
]

[tasks.snapshot]
description = "Create a snapshot release"
run = """
command -v docker >/dev/null 2>&1 || { echo 'Requires docker installed and running'; exit 1; }
docker stats --no-stream >/dev/null 2>&1 || { echo 'The docker daemon must be running'; exit 1; }
goreleaser release --snapshot --clean
"""

[tasks.bench]
description = "Run all project benchmarks"
sources = ["**/*.go"]
run = "go test ./... -run None -benchmem -bench ."

[tasks.lint]
description = "Run linting"
depends = ["fmt"]
sources = ["**/*.go", ".golangci.yml"]
run = ["golangci-lint run --fix", "typos", "nilaway ./..."]

[tasks.doc]
description = "Render the pkg docs locally"
run = "pkgsite -open"

[tasks.cov]
description = "Calculate test coverage and render the html"
outputs = ["{{ vars.COV_DATA }}"]
run = [
  "go test -race -cover -covermode atomic -coverprofile {{ vars.COV_DATA }} ./...",
  "go tool cover -html {{ vars.COV_DATA }}",
]

[tasks.check]
description = "Run tests and linting in one"
depends = ["test", "lint"]

[tasks.sloc]
description = "Print lines of code"
run = "fd . -e go | xargs wc -l | sort -nr | head"

[tasks.clean]
description = "Remove build artifacts and other clutter"
run = ["go clean ./...", "rm -rf {{ vars.COV_DATA }} ./bin ./dist"]

[tasks.update]
description = "Updates dependencies in go.mod and go.sum"
run = ["go get -u ./...", "go mod tidy"]

[tasks.uninstall]
description = "Uninstall the project from your machine"
run = "rm -rf $GOBIN/zap"

[tasks.install]
description = "Install the project on your machine"
depends = ["uninstall", "build"]
run = "cp ./bin/zap $GOBIN/zap"
